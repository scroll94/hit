<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Python Arena Lessons</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080d14;
      --panel: #111a26;
      --panel2: #172335;
      --panel3: #22334a;
      --line: #344b66;
      --text: #fff8df;
      --muted: #adbacb;
      --gold: #ffd166;
      --green: #74e39a;
      --red: #ff5f68;
      --blue: #62b6ff;
      --cyan: #67e8f9;
      --violet: #c29bff;
      --dark: #060a10;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 7%, rgba(98,182,255,.24), transparent 28%),
        radial-gradient(circle at 84% 0%, rgba(255,209,102,.13), transparent 24%),
        linear-gradient(180deg, #101827, #070b12);
    }
    button, textarea { font: inherit; }
    button { border: 0; cursor: pointer; color: inherit; }

    .global-pixels { position: fixed; inset: 0; z-index: 3; overflow: hidden; pointer-events: none; }
    .global-pixel { position: absolute; width: var(--p); height: var(--p); left: var(--x); top: 110%; background: var(--c); opacity: .34; box-shadow: 0 0 14px var(--c); animation: globalFloat var(--d) linear infinite; animation-delay: var(--delay); }
    .app { position: relative; z-index: 1; min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto auto;
      gap: 16px;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255,255,255,.09);
      background: rgba(7,11,18,.9);
      backdrop-filter: blur(14px);
    }
    .brand h1 { margin: 0; color: var(--gold); font-size: clamp(22px,3vw,34px); text-shadow: 3px 3px 0 #000; }
    .brand p { margin: 4px 0 0; color: var(--muted); font-size: 14px; }
    .difficulty { display: grid; grid-template-columns: repeat(3,1fr); gap: 4px; padding: 4px; border: 1px solid var(--line); border-radius: 8px; background: var(--dark); }
    .difficulty button { min-height: 36px; padding: 0 12px; border-radius: 6px; background: transparent; color: var(--muted); white-space: nowrap; }
    .difficulty button.active { background: var(--blue); color: #06111c; font-weight: 800; }
    .stats { display: flex; flex-wrap: wrap; justify-content: end; gap: 8px; }
    .pill { min-height: 36px; display: inline-flex; align-items: center; gap: 7px; padding: 7px 10px; border: 1px solid var(--line); border-radius: 8px; background: rgba(23,35,53,.94); color: var(--muted); white-space: nowrap; }

    .layout { display: grid; grid-template-columns: 330px minmax(0,1fr); min-height: 0; }
    .sidebar { padding: 16px; overflow: auto; border-right: 1px solid rgba(255,255,255,.08); background: rgba(8,13,20,.78); }
    .side-title, .panel-title { margin: 0 0 12px; color: var(--gold); text-transform: uppercase; letter-spacing: .08em; font-size: 13px; }
    .folder-list { display: grid; gap: 10px; }
    .folder { border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: var(--panel); }
    .folder-head { width: 100%; display: grid; grid-template-columns: 40px 1fr auto; gap: 10px; align-items: center; padding: 11px; background: linear-gradient(135deg, rgba(34,51,74,.95), rgba(17,26,38,.95)); text-align: left; }
    .folder-head.active { background: linear-gradient(135deg, #25466c, #182e48); }
    .folder-icon { width: 40px; height: 40px; display: grid; place-items: center; border-radius: 8px; background: var(--dark); color: var(--gold); font-weight: 900; }
    .folder-name { display: block; font-weight: 900; }
    .folder-meta { display: block; margin-top: 3px; color: var(--muted); font-size: 13px; }
    .folder-body { display: grid; gap: 7px; padding: 8px; }
    .level-btn { width: 100%; min-height: 52px; display: grid; grid-template-columns: 32px 1fr auto; gap: 8px; align-items: center; padding: 8px; border: 1px solid rgba(255,255,255,.09); border-radius: 8px; background: #0d1420; text-align: left; }
    .level-btn.active { border-color: var(--blue); background: #172d46; }
    .level-btn.done { border-color: rgba(116,227,154,.75); }
    .level-number { width: 32px; height: 32px; display: grid; place-items: center; border-radius: 8px; background: #070b11; color: var(--gold); font-weight: 800; }
    .level-title { display: block; font-weight: 800; }
    .level-type { display: block; color: var(--muted); font-size: 12px; margin-top: 2px; }
    .loot-dot { color: var(--gold); font-weight: 900; }

    .content { min-width: 0; padding: 16px; display: grid; grid-template-rows: minmax(430px,52vh) minmax(360px,1fr); gap: 16px; }
    .arena-wrap { position: relative; min-width: 0; overflow: hidden; border: 1px solid rgba(255,255,255,.12); border-radius: 8px; background: var(--panel); box-shadow: 0 22px 44px rgba(0,0,0,.34); }
    .arena {
      position: absolute;
      inset: 0;
      overflow: hidden;
      cursor: crosshair;
      user-select: none;
      background: linear-gradient(180deg, #72c7ec 0 42%, #638f6b 42% 62%, #584134 62% 100%);
    }
    .arena.strings { background: linear-gradient(180deg,#7cc8e7 0 42%,#7465a3 42% 60%,#49395f 60% 100%); }
    .arena.lists { background: linear-gradient(180deg,#8dd7cf 0 42%,#6f9b5f 42% 62%,#4a4738 62% 100%); }
    .arena.loops { background: linear-gradient(180deg,#87c6f4 0 42%,#71965f 42% 62%,#5a4533 62% 100%); }
    .arena.functions { background: linear-gradient(180deg,#78b8ed 0 42%,#6578a3 42% 61%,#3b3f5b 61% 100%); }
    .arena.input { background: linear-gradient(180deg,#90d5ff 0 42%,#5fa184 42% 61%,#3e4d3f 61% 100%); }
    .arena.if { background: linear-gradient(180deg,#82c7ed 0 42%,#b37b55 42% 62%,#4d332b 62% 100%); }
    .arena::before { content: ""; position: absolute; inset: 0; opacity: .2; background: linear-gradient(90deg, rgba(255,255,255,.26) 1px, transparent 1px), linear-gradient(0deg, rgba(255,255,255,.18) 1px, transparent 1px); background-size: 30px 30px; pointer-events: none; }
    .arena.fight::after { content: ""; position: absolute; inset: 0; pointer-events: none; background: radial-gradient(circle at 50% 45%, transparent 0 45%, rgba(255,40,40,.22) 78%, rgba(255,0,0,.3) 100%); animation: heat 900ms ease-in-out infinite alternate; }
